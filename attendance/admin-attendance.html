<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출결 관리 - HRD 관리자</title>
  <link rel="stylesheet" href="../admin.css">
  <link rel="stylesheet" href="attendance.css?v=2">
  <style>
    body { background: #f0f4f8; }

    .login-box {
      max-width: 360px; margin: 4rem auto; padding: 2rem;
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .login-box h2 { font-size: 1.1rem; margin-bottom: 1.2rem; }

    /* 카드 안 패널 */
    .att-panel {
      padding: 1rem 1rem 0.6rem;
      background: #f8faff;
      border-radius: 12px;
      margin-top: 0.6rem;
      border: 1px solid #e2e8f0;
    }
    .att-panel-section { margin-bottom: 1rem; }
    .att-panel-section h4 {
      font-size: 0.88rem; font-weight: 700; color: #334155;
      margin-bottom: 0.6rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    @media(max-width:480px) { .two-col { grid-template-columns: 1fr; } }
    .time-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 0.3rem; }
    .time-group input { width: 100%; padding: 0.55rem 0.8rem; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 0.92rem; }
    .time-group input:focus { outline: none; border-color: #0066cc; }

    .date-input-row { display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap; margin-top: 0.5rem; }
    .date-input-row input[type="date"] {
      padding: 0.55rem 0.8rem; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 0.88rem; flex: 1; min-width: 140px;
    }
    .holiday-info { font-size: 0.78rem; color: #64748b; background: #f0f4fa; border-radius: 8px; padding: 0.6rem 0.8rem; margin-top: 0.5rem; }
    .save-row { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 0.8rem; }

    /* 출석 현황 탭 */
    .date-tab-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem; padding: 0.2rem 0; }
    .date-tab-btn {
      padding: 0.38rem 0.9rem; border: 1.5px solid #cbd5e1;
      border-radius: 20px; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; background: #fff; color: #64748b;
      transition: all 0.15s; white-space: nowrap;
    }
    .date-tab-btn.active { background: #0066cc; color: #fff; border-color: #0066cc; }
    .date-tab-btn:hover:not(.active) { background: #f1f5f9; border-color: #94a3b8; }

    .edit-time { width: 88px; padding: 0.28rem 0.4rem; border: 1.5px solid #cbd5e1; border-radius: 6px; font-size: 0.82rem; box-sizing: border-box; }
    .edit-time:focus { outline: none; border-color: #0066cc; }
    .edit-status { padding: 0.28rem 0.4rem; border: 1.5px solid #cbd5e1; border-radius: 6px; font-size: 0.82rem; min-width: 72px; }
    .edit-status:focus { outline: none; border-color: #0066cc; }
    .absent-row td { color: #dc2626; }
    .absent-row td:first-child { font-weight: 600; }
    tr.row-changed td { background: #fffbeb !important; }

    /* 엑셀 드롭존 */
    .dropzone {
      border: 2px dashed #cbd5e1; border-radius: 12px;
      padding: 1.4rem 1rem; text-align: center;
      cursor: pointer; transition: all 0.15s;
      background: #fff; user-select: none;
    }
    .dropzone:hover { border-color: #0066cc; background: #eff6ff; }
    .dropzone.dragover { border-color: #0066cc; background: #dbeafe; transform: scale(1.01); }
    .dropzone.has-file { border-color: #16a34a; background: #f0fdf4; border-style: solid; }
    .dz-icon { font-size: 1.6rem; line-height: 1; margin-bottom: 0.4rem; }
    .dz-main { font-size: 0.92rem; font-weight: 600; color: #334155; }
    .dz-sub { font-size: 0.78rem; color: #64748b; margin-top: 0.25rem; }
    .dz-filename { font-size: 0.85rem; color: #166534; font-weight: 600; margin-top: 0.5rem; word-break: break-all; }
    .dz-clear {
      display: inline-block; margin-left: 0.4rem; padding: 0 0.45rem;
      border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; color: #64748b; font-size: 0.75rem; cursor: pointer;
    }
    .dz-clear:hover { color: #dc2626; border-color: #fca5a5; }

    /* 출석 현황 탭 헤더 */
    .course-header-card {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.9rem 1.2rem;
    }
    .course-header-info { flex: 1; min-width: 0; }
    .course-header-label { font-size: 0.78rem; color: #64748b; }
    .course-header-name { display: block; font-size: 1.05rem; font-weight: 700; color: #1e3a8a; }
    .back-btn {
      padding: 0.4rem 0.8rem; border: 1.5px solid #cbd5e1; background: #fff;
      border-radius: 8px; font-size: 0.85rem; cursor: pointer; color: #475569;
    }
    .back-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:0.6rem;">📊</div>
    <h2>출결 관리 시스템</h2>
    <p style="font-size:0.83rem;color:#64748b;margin-bottom:1.2rem;">관리자 암호를 입력하세요</p>
    <div class="form-group">
      <input type="password" id="admin-pw" placeholder="관리자 암호" style="width:100%;padding:0.7rem;border:1.5px solid #cbd5e1;border-radius:10px;font-size:1rem;">
    </div>
    <button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">로그인</button>
    <div id="login-err" class="error-text" style="margin-top:0.5rem;display:none;"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" style="display:none;">
  <div class="att-header">
    <div>
      <h1>📊 출결 관리</h1>
      <div class="sub">HRD 인력개발교육원 관리자</div>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <a href="scan.html" class="btn btn-secondary btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;text-decoration:none;">📷 QR 스캔</a>
      <button class="btn btn-secondary btn-sm" onclick="adminLogout()" style="background:rgba(255,255,255,0.15);color:#fff;">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <!-- 교육과정 관리 (메인) -->
    <div id="main-tab-courses">
      <div class="section-card">
        <div class="section-title">등록된 교육과정 <span id="course-count" class="badge"></span></div>
        <div id="course-manage-loading" class="loading">불러오는 중...</div>
        <div id="course-manage-list"></div>
        <div id="course-manage-empty" class="no-data" style="display:none;">등록된 교육과정이 없습니다.</div>
        <button class="icon-refresh-btn" onclick="loadCourseList()" title="새로고침">새로고침</button>
      </div>
    </div>

    <!-- 출석 현황 탭 -->
    <div id="main-tab-records" style="display:none;">
      <div class="section-card course-header-card">
        <button class="back-btn" onclick="backToCourses()">← 교육과정</button>
        <div class="course-header-info">
          <span class="course-header-label">출석 현황</span>
          <span class="course-header-name" id="records-course-name">-</span>
        </div>
        <button class="icon-refresh-btn" onclick="loadAttendanceRecords()" title="새로고침">새로고침</button>
      </div>

      <div id="records-placeholder" class="no-data">교육과정 목록에서 "출석 현황" 버튼을 눌러 진입해 주세요.</div>

      <div id="records-area" style="display:none;">
        <div class="rate-summary" id="rate-summary" style="display:none;">
          <div class="rate-card"><div class="num" id="rate-total">0</div><div class="label">전체 교육생</div></div>
          <div class="rate-card"><div class="num" id="rate-present">0</div><div class="label">출석</div></div>
          <div class="rate-card highlight"><div class="num" id="rate-absent">0</div><div class="label">미출석</div></div>
          <div class="rate-card"><div class="num" id="rate-pct">0%</div><div class="label">출석률</div></div>
        </div>

        <div class="date-tab-bar" id="date-tab-bar">
          <span style="font-size:0.85rem;color:#94a3b8;">수업일을 선택하세요.</span>
        </div>

        <div class="section-card" id="records-card" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;">
            <span id="records-title" style="font-size:0.9rem;font-weight:600;color:#334155;"></span>
            <button class="btn btn-secondary btn-sm" onclick="exportExcel()">엑셀 다운로드</button>
          </div>
          <div class="att-table-wrap">
            <table class="att-table" id="att-table">
              <thead id="att-thead"></thead>
              <tbody id="att-tbody">
                <tr><td colspan="5" class="loading">날짜 탭을 선택하세요.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SheetJS for Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script type="module" src="admin-attendance.js"></script>
</body>
</html>
