<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- iOS 홈 화면 추가 시 풀스크린 모드 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QR 출석">
  <meta name="theme-color" content="#0f172a">
  <title>QR 스캔 - 출결관리</title>
  <link rel="stylesheet" href="attendance.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .scan-page { max-width: 720px; }

    /* 큰 시계 */
    .clock-bar {
      background: #1e293b;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      text-align: center;
    }
    .clock-time {
      font-size: 3.2rem;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
    }
    .clock-date {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    /* 결과 오버레이 — 더 크게/명확하게 */
    .scan-result {
      border-radius: 16px; padding: 1.8rem 1.2rem;
      text-align: center; margin: 0.8rem 0;
      display: none;
    }
    .scan-result.success { background: #052e16; border: 3px solid #16a34a; }
    .scan-result.error   { background: #2c0a0a; border: 3px solid #dc2626; }
    .scan-result.warning { background: #292010; border: 3px solid #d97706; }
    .scan-result-icon { font-size: 3.6rem; margin-bottom: 0.4rem; line-height: 1; }
    .scan-result-text { font-size: 1.6rem; font-weight: 800; color: #f1f5f9; }
    .scan-result-sub { font-size: 1rem; color: #cbd5e1; margin-top: 0.5rem; }

    /* Wake lock 상태 */
    .wake-status {
      font-size: 0.75rem;
      color: #64748b;
      text-align: right;
      margin-bottom: 0.4rem;
    }
    .wake-status.active { color: #22c55e; }

    /* 카메라 전환 */
    .camera-switch {
      display: flex; gap: 0.4rem;
      margin-bottom: 0.6rem;
      background: #1e293b;
      border-radius: 12px;
      padding: 0.4rem;
    }
    .camera-switch button {
      flex: 1;
      background: transparent;
      color: #94a3b8;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .camera-switch button.active {
      background: #2563eb;
      color: #fff;
    }

    /* html5-qrcode 오버라이드 */
    #qr-reader { background: #000 !important; border-radius: 16px !important; overflow: hidden; }
    #qr-reader video { width: 100% !important; border-radius: 16px; }
    #qr-reader__scan_region { border-radius: 16px; }
    #qr-reader__dashboard { display: none !important; }
    #qr-reader img[alt="Info icon"] { display: none !important; }
  </style>
</head>
<body>

<div class="att-header">
  <div>
    <h1>📷 QR 출석 스캔</h1>
    <div class="sub" id="scan-date-label"></div>
  </div>
  <div id="wake-status" class="wake-status">화면 켜짐 유지 대기</div>
</div>

<div class="scan-page container">

  <!-- 시계 -->
  <div class="clock-bar">
    <div class="clock-time" id="scan-time-label">--:--:--</div>
  </div>

  <!-- 카메라 전환 -->
  <div class="camera-switch">
    <button type="button" data-facing="user">전면 카메라</button>
    <button type="button" data-facing="environment">후면 카메라</button>
  </div>

  <!-- QR 스캐너 -->
  <div id="qr-reader"></div>

  <!-- 스캔 결과 -->
  <div id="scan-result" class="scan-result">
    <div class="scan-result-icon" id="result-icon"></div>
    <div class="scan-result-text" id="result-text"></div>
    <div class="scan-result-sub" id="result-sub"></div>
  </div>

</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script type="module" src="scan.js?v=4"></script>
</body>
</html>
