<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- iOS 홈 화면 추가 시 풀스크린 모드 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QR 출석">
  <meta name="theme-color" content="#0f172a">
  <title>QR 스캔 - 출결관리</title>
  <link rel="stylesheet" href="attendance.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .scan-page { max-width: 720px; }

    /* 큰 시계 (날짜 + 시간 한 줄) */
    .clock-bar {
      background: #1e293b;
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      margin: 0.6rem 0 0.8rem;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .clock-date {
      font-size: 1.05rem;
      color: #94a3b8;
      font-weight: 500;
    }
    .clock-time {
      font-size: 3.2rem;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* 결과 오버레이 — 더 크게/명확하게 */
    .scan-result {
      border-radius: 16px; padding: 1.8rem 1.2rem;
      text-align: center; margin: 0.8rem 0;
      display: none;
    }
    .scan-result.success { background: #052e16; border: 3px solid #16a34a; }
    .scan-result.error   { background: #2c0a0a; border: 3px solid #dc2626; }
    .scan-result.warning { background: #292010; border: 3px solid #d97706; }
    .scan-result-icon { font-size: 3.6rem; margin-bottom: 0.4rem; line-height: 1; }
    .scan-result-text { font-size: 1.6rem; font-weight: 800; color: #f1f5f9; }
    .scan-result-sub { font-size: 1rem; color: #cbd5e1; margin-top: 0.5rem; }

    /* 카메라 전환 — 운영자만 보면 되므로 작고 은은하게 */
    .camera-switch {
      display: flex; gap: 0.2rem;
      justify-content: center;
      align-items: center;
      margin: 1rem 0 0.2rem;
      opacity: 0.45;
      transition: opacity 0.2s;
    }
    .camera-switch:hover { opacity: 0.9; }
    .camera-switch button {
      background: transparent;
      color: #64748b;
      border: none;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
    }
    .camera-switch button.active {
      color: #cbd5e1;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .camera-switch .sep {
      color: #475569;
      font-size: 0.7rem;
    }

    /* html5-qrcode 오버라이드 */
    #qr-reader { background: #000 !important; border-radius: 16px !important; overflow: hidden; }
    #qr-reader video { width: 100% !important; border-radius: 16px; }
    #qr-reader__scan_region { border-radius: 16px; }
    #qr-reader__dashboard { display: none !important; }
    #qr-reader img[alt="Info icon"] { display: none !important; }
  </style>
</head>
<body>

<div class="scan-page container">

  <!-- 시계 + 날짜 -->
  <div class="clock-bar">
    <div class="clock-date" id="scan-date-label"></div>
    <div class="clock-time" id="scan-time-label">--:--:--</div>
  </div>

  <!-- QR 스캐너 -->
  <div id="qr-reader"></div>

  <!-- 스캔 결과 -->
  <div id="scan-result" class="scan-result">
    <div class="scan-result-icon" id="result-icon"></div>
    <div class="scan-result-text" id="result-text"></div>
    <div class="scan-result-sub" id="result-sub"></div>
  </div>

  <!-- 카메라 전환 (운영자용, 하단에 작게) -->
  <div class="camera-switch">
    <button type="button" data-facing="user">전면</button>
    <span class="sep">·</span>
    <button type="button" data-facing="environment">후면</button>
  </div>

</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script type="module" src="scan.js?v=5"></script>
</body>
</html>
