<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>출석 확인 - 대전광역시 인재개발원</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 0.4rem; }
    .org { font-size: 0.85rem; color: #6b7280; margin-bottom: 0.2rem; }
    .title { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 0.3rem; }
    .session-badge {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 20px;
      padding: 0.25rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status-icon { font-size: 3rem; margin: 1rem 0 0.6rem; }
    .status-msg { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 0.4rem; }
    .status-sub { font-size: 0.9rem; color: #6b7280; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    .form-group input:focus, .form-group select:focus { border-color: #2563eb; }
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .refresh-btn {
      width: 100%;
      padding: 0.8rem;
      background: #f3f4f6;
      color: #374151;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #e5e7eb; }
    .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .success-name { font-size: 1.3rem; font-weight: 700; color: #2563eb; margin: 0.4rem 0; }
    .success-time { font-size: 0.9rem; color: #6b7280; }
    .hidden { display: none !important; }
    .loading-msg { color: #6b7280; font-size: 0.9rem; margin-top: 0.5rem; }
    .manual-toggle { font-size: 0.8rem; color: #2563eb; cursor: pointer; margin-top: 0.5rem; display: inline-block; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏛️</div>
    <div class="org">대전광역시 인재개발원</div>
    <div class="title">출석 확인</div>
    <div id="session-info" class="session-badge"></div>

    <!-- 로딩 -->
    <div id="screen-loading" class="hidden">
      <div class="status-icon">⏳</div>
      <div class="status-msg">확인 중...</div>
    </div>

    <!-- 토큰 만료 -->
    <div id="screen-expired" class="hidden">
      <div class="status-icon">⏰</div>
      <div class="status-msg">출석 시간이 초과되었습니다</div>
      <div class="status-sub">관리자에게 문의해 주세요.</div>
      <button class="refresh-btn" onclick="location.reload()">🔄 새로고침</button>
    </div>

    <!-- 이미 출석 -->
    <div id="screen-duplicate" class="hidden">
      <div class="status-icon">⚠️</div>
      <div class="status-msg">이미 출석 처리된 기기입니다</div>
      <div class="status-sub">동일 기기로 중복 출석은 불가합니다.</div>
    </div>

    <!-- 입력 폼 -->
    <div id="screen-form" class="hidden">
      <!-- 수강생 선택 드롭다운 (수강생 명단이 있을 때) -->
      <div id="student-select-group" class="form-group hidden">
        <label for="student-select">이름 선택</label>
        <select id="student-select" onchange="onStudentSelect()">
          <option value="">-- 이름을 선택하세요 --</option>
        </select>
        <span class="manual-toggle" onclick="toggleManualInput()">직접 입력하기</span>
      </div>

      <!-- 수동 입력 (수강생 명단이 없거나 직접 입력 선택 시) -->
      <div id="manual-input-group">
        <div class="form-group">
          <label for="input-name">이름</label>
          <input type="text" id="input-name" placeholder="홍길동" maxlength="20" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="input-code">교번</label>
          <input type="number" id="input-code" placeholder="예: 12345" min="1" inputmode="numeric">
        </div>
      </div>

      <div id="form-error" class="error-msg">이름과 교번을 모두 입력해 주세요.</div>
      <button class="submit-btn" id="submit-btn" onclick="submitAttendance()">출석 확인</button>
    </div>

    <!-- 출석 완료 -->
    <div id="screen-success" class="hidden">
      <div class="status-icon">✅</div>
      <div class="status-msg">출석이 확인되었습니다</div>
      <div class="success-name" id="success-name"></div>
      <div class="success-time" id="success-time"></div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import {
      collection, query, where, getDocs, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const ATT_TOKEN_SECONDS = 30;

    function getCurrentToken() {
      const slot = Math.floor(Date.now() / (ATT_TOKEN_SECONDS * 1000));
      return btoa(slot.toString()).replace(/=/g, '');
    }

    function getPrevToken() {
      const slot = Math.floor(Date.now() / (ATT_TOKEN_SECONDS * 1000)) - 1;
      return btoa(slot.toString()).replace(/=/g, '');
    }

    function getOrCreateDeviceToken() {
      let token = localStorage.getItem('att_device_token');
      if (!token) {
        token = crypto.randomUUID();
        localStorage.setItem('att_device_token', token);
      }
      return token;
    }

    function show(id) {
      ['screen-loading', 'screen-expired', 'screen-duplicate', 'screen-form', 'screen-success'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function formatNow() {
      const d = new Date();
      return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // URL 파라미터 파싱
    const params = new URLSearchParams(location.search);
    const urlToken = params.get('token') || '';
    const sessionLabel = decodeURIComponent(params.get('session') || '');
    const courseName = decodeURIComponent(params.get('course') || '');
    const courseId = decodeURIComponent(params.get('cid') || '');
    const sessionId = `${courseName}__${sessionLabel}`;

    document.getElementById('session-info').textContent =
      (courseName && sessionLabel) ? `${courseName} · ${sessionLabel}` : '출석 확인';

    // 수강생 데이터
    let students = []; // [{name, empNo}]

    // 수강생 선택 드롭다운 콜백
    window.onStudentSelect = function() {
      const sel = document.getElementById('student-select');
      const idx = parseInt(sel.value, 10);
      if (!isNaN(idx) && students[idx]) {
        document.getElementById('input-name').value = students[idx].name;
        document.getElementById('input-code').value = students[idx].empNo;
      } else {
        document.getElementById('input-name').value = '';
        document.getElementById('input-code').value = '';
      }
    };

    // 직접 입력 토글
    window.toggleManualInput = function() {
      const manualGroup = document.getElementById('manual-input-group');
      const selectGroup = document.getElementById('student-select-group');
      const isHidden = manualGroup.style.display === 'none';
      if (isHidden) {
        manualGroup.style.display = 'block';
        document.querySelector('.manual-toggle').textContent = '목록에서 선택하기';
      } else {
        manualGroup.style.display = 'none';
        document.querySelector('.manual-toggle').textContent = '직접 입력하기';
        document.getElementById('input-name').value = '';
        document.getElementById('input-code').value = '';
        document.getElementById('student-select').value = '';
      }
    };

    // 수강생 목록 불러오기
    async function loadStudents() {
      if (!courseId) return;
      try {
        const snap = await getDocs(collection(db, 'courses', courseId, 'students'));
        students = snap.docs
          .map(d => ({ name: d.data().name || '', empNo: String(d.data().empNo || '') }))
          .filter(s => s.name)
          .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        if (students.length > 0) {
          const sel = document.getElementById('student-select');
          sel.innerHTML = '<option value="">-- 이름을 선택하세요 --</option>' +
            students.map((s, i) => `<option value="${i}">${s.name} (교번: ${s.empNo})</option>`).join('');
          document.getElementById('student-select-group').classList.remove('hidden');
          document.getElementById('manual-input-group').style.display = 'none';
        }
      } catch (e) {
        // 불러오기 실패 시 수동 입력 유지
      }
    }

    // 토큰 검증
    show('screen-loading');

    if (!urlToken || (urlToken !== getCurrentToken() && urlToken !== getPrevToken())) {
      show('screen-expired');
    } else {
      const deviceToken = getOrCreateDeviceToken();

      (async () => {
        try {
          const dupSnap = await getDocs(
            query(
              collection(db, 'attendance_logs'),
              where('sessionId', '==', sessionId),
              where('deviceToken', '==', deviceToken)
            )
          );
          if (!dupSnap.empty) {
            show('screen-duplicate');
            return;
          }
        } catch (e) {
          // 읽기 권한 없으면 중복 체크 생략, 제출 시 처리
        }

        await loadStudents();
        show('screen-form');
      })();

      window.submitAttendance = async function () {
        const name = document.getElementById('input-name').value.trim();
        const code = document.getElementById('input-code').value.trim();
        const errEl = document.getElementById('form-error');
        const btn = document.getElementById('submit-btn');

        if (!name || !code) {
          errEl.style.display = 'block';
          return;
        }
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = '처리 중...';

        try {
          await addDoc(collection(db, 'attendance_logs'), {
            sessionId,
            courseName,
            sessionLabel,
            name,
            participantCode: code,
            deviceToken,
            attendedAt: serverTimestamp()
          });

          document.getElementById('success-name').textContent = `${name}님`;
          document.getElementById('success-time').textContent = formatNow();
          show('screen-success');
        } catch (e) {
          btn.disabled = false;
          btn.textContent = '출석 확인';
          alert('오류가 발생했습니다. 다시 시도해 주세요.');
        }
      };
    }
  </script>
</body>
</html>
