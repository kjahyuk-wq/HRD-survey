<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 - 대전광역시 인재개발원</title>
  <link href="style.css" rel="stylesheet">
  <link href="admin.css" rel="stylesheet">
</head>
<body>

  <!-- 로그인 -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="logo-icon" style="font-size:3rem;display:block;margin-bottom:.5rem;">🏛️</div>
      <div class="org-name" style="text-align:center;margin-bottom:4px;">대전광역시 인재개발원</div>
      <h2>관리자 로그인</h2>
      <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')checkLogin()">
      <button onclick="checkLogin()">로그인</button>
      <div id="pw-error" class="pw-error" style="display:none;">비밀번호가 올바르지 않습니다.</div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="dashboard" style="display:none;">
    <div class="container">
      <header>
        <div class="logo-area">
          <div class="logo-icon">🏛️</div>
          <div>
            <div class="org-name">대전광역시 인재개발원</div>
            <h1>관리자 페이지</h1>
          </div>
        </div>
        <div class="header-actions">
          <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
      </header>

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('courses')">📋 교육과정 관리</button>
        <button class="tab-btn" onclick="switchTab('stats')">📊 설문 통계</button>
      </div>

      <!-- 교육과정 관리 탭 -->
      <div id="tab-courses">
        <div class="section-card">
          <div class="section-title">교육과정 추가</div>
          <div class="add-course-row">
            <input type="text" id="new-course-input" placeholder="교육과정명을 입력하세요" onkeydown="if(event.key==='Enter')addCourse()">
            <button class="add-btn" onclick="addCourse()">+ 추가</button>
          </div>
        </div>
        <div class="section-card">
          <div class="section-title">등록된 교육과정 <span id="course-count" class="badge"></span></div>
          <div id="course-manage-loading" class="loading">불러오는 중...</div>
          <div id="course-manage-list"></div>
          <div id="course-manage-empty" class="no-data" style="display:none;">등록된 교육과정이 없습니다.</div>
        </div>
      </div>

      <!-- 설문 통계 탭 -->
      <div id="tab-stats" style="display:none;">
        <div class="section-card">
          <div class="section-title">교육과정 선택</div>
          <div class="course-select-row">
            <select id="stats-course-select" onchange="loadStats()">
              <option value="">-- 교육과정을 선택하세요 --</option>
            </select>
            <button class="refresh-btn" onclick="loadStats()">새로고침</button>
          </div>
        </div>

        <div id="stats-placeholder" class="no-data">위에서 교육과정을 선택하면 통계가 표시됩니다.</div>
        <div id="stats-loading" class="loading" style="display:none;">통계를 불러오는 중...</div>
        <div id="stats-no-data" class="no-data" style="display:none;">해당 교육과정의 응답이 없습니다.</div>

        <div id="stats-area" style="display:none;">
          <div class="summary-cards">
            <div class="summary-card"><div class="card-label">총 응답 수</div><div class="card-value" id="total-count">-</div></div>
            <div class="summary-card highlight"><div class="card-label">전체 평균</div><div class="card-value" id="overall-avg">-</div><div class="card-sub">/ 5.0</div></div>
            <div class="summary-card"><div class="card-label">최고 항목</div><div class="card-value" id="best-q">-</div></div>
            <div class="summary-card"><div class="card-label">개선 필요</div><div class="card-value" id="worst-q">-</div></div>
          </div>

          <div class="section-title">항목별 평균 점수</div>
          <div class="question-stats" id="question-stats"></div>

          <div class="section-title">교육생 의견 <span id="comment-count" class="badge"></span></div>
          <div id="comments-list" class="comments-list"></div>

          <div class="section-title">응답 목록</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>제출일시</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Q5</th><th>평균</th></tr>
              </thead>
              <tbody id="responses-body"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
